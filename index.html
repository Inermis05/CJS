<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJS- CTN 장비 관리 시스템</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 구글 폰트 (한국어 지원) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

    <!-- 배경 빛 효과 (장식) -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 로그인 카드 -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- 로고 영역 -->
            <div class="login-logo">
                <!--
                    로고 이미지를 assets/logo.png로 넣으면 자동으로 표시됩니다.
                    이미지가 없으면 아래 fallback(📻 아이콘)이 보입니다.
                -->
                <div class="logo-image-wrapper">
                    <img src="assets/logo.png" alt="방송부 로고" class="logo-image"
                         onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex'">
                    <div id="logoFallback" class="logo-fallback" style="display:none">📻</div>
                </div>
                <div class="logo-text">
                    <h1 class="logo-title">CTN</h1>
                    <p class="logo-subtitle">장비 관리 시스템</p>
                </div>
            </div>

            <!-- 구분선 -->
            <div class="login-divider">
                <span>CTN 부원 전용</span>
            </div>

            <!-- 구글 로그인 버튼 -->
            <button id="loginBtn" class="btn-google-login" type="button">
                <svg viewBox="0 0 24 24" class="google-icon" aria-hidden="true">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                개인 Google 계정으로 로그인
            </button>

            <!-- 로딩 중 표시 -->
            <div id="loginLoading" class="login-loading hidden">
                <div class="spinner"></div>
                <span>로그인 확인 중...</span>
            </div>

            <!-- 에러 메시지 -->
            <div id="loginError" class="login-error hidden">
                <svg viewBox="0 0 24 24" class="error-icon" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <p id="loginErrorMsg">허용되지 않은 계정입니다.</p>
            </div>
        </div>

        <p class="login-footer">접속 문제가 있으면 30730 황성주에게 문의하세요</p>
    </div>

    <!-- ============================================================
         Firebase 로그인 스크립트
         type="module" : ES모듈 방식 (import/export 사용 가능)
         ============================================================ -->
    <script type="module">
        // Firebase에서 필요한 기능들을 불러옵니다
        import { initializeApp }
            from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
            from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, getDoc }
            from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // 우리가 설정한 Firebase 프로젝트 정보 불러오기
        import { firebaseConfig } from './js/config.js';

        // Firebase 초기화
        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // ── 이미 로그인된 상태면 바로 앱으로 이동 ──────────
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 로그인은 됐지만 허용된 부원인지 확인
                const ok = await isAllowed(user.email);
                if (ok) {
                    window.location.href = 'app.html';
                } else {
                    // 허용 안 된 계정이면 로그아웃 처리
                    await signOut(auth);
                }
            }
        });

        // ── 허용된 이메일인지 Firestore에서 확인 ───────────
        async function isAllowed(email) {
            try {
                // 이메일을 Firestore 문서 ID로 변환
                // 예: hong@school.hs.kr → hong_at_school_hs_kr
                const key = email.replace(/@/g, '_at_').replace(/\./g, '_');
                const snap = await getDoc(doc(db, 'allowedEmails', key));
                return snap.exists() && snap.data().allowed === true;
            } catch {
                return false;
            }
        }

        // ── 로그인 버튼 클릭 처리 ───────────────────────────
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn     = document.getElementById('loginBtn');
            const loading = document.getElementById('loginLoading');
            const errBox  = document.getElementById('loginError');

            // 버튼 숨기고 로딩 표시
            btn.style.display = 'none';
            loading.classList.remove('hidden');
            errBox.classList.add('hidden');

            try {
                // Google 로그인 팝업 열기
                const provider = new GoogleAuthProvider();
                const result   = await signInWithPopup(auth, provider);
                const user     = result.user;

                const ok = await isAllowed(user.email);

                if (ok) {
                    // 허용된 부원 → 앱으로 이동
                    window.location.href = 'app.html';
                } else {
                    // 허용 안 된 계정 → 로그아웃 후 에러 표시
                    await signOut(auth);
                    showError(`"${user.email}" 계정은 방송부 부원으로 등록되어 있지 않습니다.`);
                }
            } catch (err) {
                // 팝업을 직접 닫은 경우는 에러로 처리하지 않음
                if (err.code === 'auth/popup-closed-by-user') {
                    // 그냥 버튼 다시 보여주기
                } else {
                    showError('로그인 중 오류가 발생했습니다. 다시 시도해주세요.');
                    console.error('Login error:', err);
                }
            } finally {
                // 버튼 복원
                btn.style.display = 'flex';
                loading.classList.add('hidden');
            }
        });

        // 에러 메시지 표시 함수
        function showError(msg) {
            document.getElementById('loginErrorMsg').textContent = msg;
            document.getElementById('loginError').classList.remove('hidden');
        }
    </script>
</body>
</html>
